  <script>
    const buttons = document.querySelectorAll('.copy-button');

    buttons.forEach((button) => {
      button.addEventListener('click', async () => {
        const dataset = document.getElementById(button.dataset.target);

        dataset.focus();
        dataset.select();
        dataset.setSelectionRange(0, dataset.value.length);

        try {
          await navigator.clipboard.writeText(dataset.value);
        } catch {
          document.execCommand('copy');
        }
      });
    });
  </script>
